<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sliding Puzzle – Mobile + Desktop Friendly</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}
h1 { margin:10px; font-size:22px; }

#controls {
  display:flex; flex-direction:column; align-items:center; gap:8px;
}
input, button {
  font-size:18px; padding:10px; width:90%; max-width:300px; border-radius:8px; border:none;
}
button { background:#38bdf8; color:black; }

#puzzle {
  display: grid;
  gap: 4px;
  margin: 15px auto;
  border-radius: 12px;
  grid-template-columns: repeat(var(--cols), 1fr);
  width: 90vw;
  max-width: 600px;
  touch-action: none;
  background:#020617;
  overflow: hidden;
}

.tile {
  width: 100%;
  height: 0;
  padding-top: 100%;
  border-radius: 8px;
  background-size: cover;
  background-position: center;
  position: relative;
  transition: all 0.25s ease;
  cursor: pointer;
}

.tile span {
  position: absolute;
  top:50%; left:50%;
  transform: translate(-50%, -50%);
  font-weight:bold;
  color:black;
  font-size:1.2em;
}

#overlay {
  position:fixed; top:0; left:0; width:100%; height:100%; background:black;
  display:none; justify-content:center; align-items:center; flex-direction:column;
}
#zoomImage {
  max-width:90vw; max-height:60vh; object-fit:contain;
  transform: scale(0.6); opacity:0; transition: all 0.6s ease;
}
</style>
</head>
<body>

<h1>🧩 Sliding Puzzle</h1>

<div id="controls">
  <button onclick="startGame()">Start Game</button>
  Grid Size: <input type="number" id="size" value="4" min="2" max="6">
  <input type="file" id="imgUpload">
</div>

<p>Moves: <span id="moves">0</span></p>
<div id="puzzle"></div>

<div id="overlay">
  <h2>✨ Completed Puzzle! ✨</h2>
  <img id="zoomImage">
  <br>
  <button onclick="restartGame()">Restart</button>
</div>

<script>
let size=4, tiles=[], empty=0, moves=0;
let imageSrc='';
const puzzle=document.getElementById('puzzle');
const overlay=document.getElementById('overlay');
const zoomImage=document.getElementById('zoomImage');

document.getElementById('imgUpload').onchange=e=>{
  imageSrc=URL.createObjectURL(e.target.files[0]);
};

function startGame(){
  size = +document.getElementById('size').value;
  puzzle.style.setProperty('--cols', size);
  tiles=[...Array(size*size).keys()];
  empty=tiles.length-1;
  for(let i=0;i<150;i++) randomMove();
  moves=0; document.getElementById('moves').textContent=0;
  overlay.style.display='none';
  document.getElementById('controls').style.display='flex';
  draw();
}

function restartGame(){ startGame(); }

function draw(){
  puzzle.innerHTML='';
  puzzle.style.setProperty('--cols', size);
  tiles.forEach((val,i)=>{
    if(val===size*size-1) return;
    const cell=document.createElement('div'); cell.className='tile';
    const r=Math.floor(i/size), c=i%size;
    if(imageSrc){
      const ir=Math.floor(val/size), ic=val%size;
      cell.style.backgroundImage=`url(${imageSrc})`;
      cell.style.backgroundSize=`${size*100}%`;
      cell.style.backgroundPosition=`${ic/(size-1)*100}% ${ir/(size-1)*100}%`;
    } else {
      const span=document.createElement('span'); span.textContent=val+1; cell.appendChild(span);
    }
    cell.onclick=()=>move(i);
    puzzle.appendChild(cell);
  });
}

function move(i){
  if(canMove(i)){
    [tiles[i],tiles[empty]]=[tiles[empty],tiles[i]]; empty=i;
    moves++; document.getElementById('moves').textContent=moves;
    draw();
    if(isSolved()) win();
  }
}

function canMove(i){
  let r=Math.floor(i/size), c=i%size;
  let er=Math.floor(empty/size), ec=empty%size;
  return (r===er&&Math.abs(c-ec)===1)||(c===ec&&Math.abs(r-er)===1);
}

function randomMove(){
  let opts=[], r=Math.floor(empty/size), c=empty%size;
  if(r>0) opts.push(empty-size);
  if(r<size-1) opts.push(empty+size);
  if(c>0) opts.push(empty-1);
  if(c<size-1) opts.push(empty+1);
  let t=opts[Math.floor(Math.random()*opts.length)];
  [tiles[t],tiles[empty]]=[tiles[empty],tiles[t]]; empty=t;
}

function isSolved(){ return tiles.every((v,i)=>v===i); }

function win(){
  overlay.style.display='flex';
  document.getElementById('controls').style.display='none';
  zoomImage.src=imageSrc;
  setTimeout(()=>{ zoomImage.style.transform='scale(1)'; zoomImage.style.opacity='1'; },50);
}

// Swipe support
let startX,startY;
puzzle.addEventListener("touchstart", e=>{ startX=e.touches[0].clientX; startY=e.touches[0].clientY; });
puzzle.addEventListener("touchend", e=>{
  let dx=e.changedTouches[0].clientX-startX;
  let dy=e.changedTouches[0].clientY-startY;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>20) tryMove('right'); else if(dx<-20) tryMove('left');
  } else {
    if(dy>20) tryMove('down'); else if(dy<-20) tryMove('up');
  }
});

function tryMove(dir){
  let r=Math.floor(empty/size), c=empty%size;
  if(dir==='up' && r<size-1) move(empty+size);
  if(dir==='down' && r>0) move(empty-size);
  if(dir==='left' && c<size-1) move(empty+1);
  if(dir==='right' && c>0) move(empty-1);
}
</script>

</body>
</html>
