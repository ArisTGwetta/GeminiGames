<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sliding Puzzle – Variable Picture Shape</title>
<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; text-align:center; }
h1 { margin:10px; font-size:22px; }
#controls { display:flex; flex-direction:column; align-items:center; gap:8px; margin-bottom:10px; }
input, button { font-size:18px; padding:10px; width:90%; max-width:300px; border-radius:8px; border:none; }
button { background:#38bdf8; color:black; cursor:pointer; }
#puzzle {
  display:grid; margin:15px auto; gap:4px;
  width:90vw; max-width:500px;
  grid-template-columns: repeat(var(--cols), 1fr);
  grid-template-rows: repeat(var(--rows), 1fr);
  touch-action: none;
  background:#020617;
  border-radius:12px;
  overflow:hidden;
}
.tile {
  width:100%; height:100%;
  border-radius:8px; background-size: cover; background-position:center;
  position:relative; transition: all 0.25s ease; cursor:pointer;
}
.tile span {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%); font-weight:bold; color:black; font-size:1.2em;
}
#overlay {
  position:fixed; top:0; left:0; width:100%; height:100%; background:black;
  display:none; justify-content:center; align-items:center; flex-direction:column;
}
#zoomImage {
  max-width:90vw; max-height:60vh; object-fit:contain;
  transform:scale(0.6); opacity:0; transition: all 0.6s ease;
  margin-bottom:10px;
}
</style>
</head>
<body>

<h1>🧩 Sliding Puzzle – Variable Shape</h1>

<div id="controls">
  <button onclick="startGame()">Start Game</button>
  <input type="file" id="imgUpload">
  Scramble Moves: <input type="number" id="scramble" value="50" min="10" max="200">
</div>

<p>Moves: <span id="moves">0</span></p>
<div id="puzzle"></div>

<div id="overlay">
  <h2>✨ Completed Puzzle! ✨</h2>
  <img id="zoomImage">
  <button onclick="restartGame()">Restart</button>
</div>

<script>
let tiles=[], empty=0, moves=0, rows=0, cols=0, imgSrc='';
const puzzle=document.getElementById('puzzle');
const overlay=document.getElementById('overlay');
const zoomImage=document.getElementById('zoomImage');

document.getElementById('imgUpload').onchange=e=>{
  imgSrc=URL.createObjectURL(e.target.files[0]);
};

function startGame(){
  moves=0; document.getElementById('moves').textContent=moves;
  overlay.style.display='none';

  const img=new Image();
  img.onload=()=>{
    const aspect=img.width/img.height;
    rows=4; cols=Math.round(rows*aspect);
    puzzle.style.setProperty('--rows', rows);
    puzzle.style.setProperty('--cols', cols);

    tiles=[...Array(rows*cols).keys()];
    empty=tiles.length-1;

    let scrambleMoves=+document.getElementById('scramble').value;
    for(let i=0;i<scrambleMoves;i++) randomMove();

    draw();
  };
  img.src=imgSrc;
}

function restartGame(){ startGame(); }

function draw(){
  puzzle.innerHTML='';
  tiles.forEach((val,i)=>{
    if(val===tiles.length-1) return;
    const tile=document.createElement('div'); tile.className='tile';
    const r=Math.floor(i/cols), c=i%cols;
    if(imgSrc){
      const ir=Math.floor(val/cols), ic=val%cols;
      tile.style.backgroundImage=`url(${imgSrc})`;
      tile.style.backgroundSize=`${cols*100}% ${rows*100}%`;
      tile.style.backgroundPosition=`${ic/(cols-1)*100}% ${ir/(rows-1)*100}%`;
    } else {
      const span=document.createElement('span'); span.textContent=val+1; tile.appendChild(span);
    }
    tile.onclick=()=>move(i);
    puzzle.appendChild(tile);
  });
}

function move(i){
  if(canMove(i)){
    [tiles[i],tiles[empty]]=[tiles[empty],tiles[i]]; empty=i;
    moves++; document.getElementById('moves').textContent=moves;
    draw();
    if(isSolved()) win();
  }
}

function canMove(i){
  let r=Math.floor(i/cols), c=i%cols;
  let er=Math.floor(empty/cols), ec=empty%cols;
  return (r===er && Math.abs(c-ec)===1) || (c===ec && Math.abs(r-er)===1);
}

function randomMove(){
  let opts=[], r=Math.floor(empty/cols), c=empty%cols;
  if(r>0) opts.push(empty-cols);
  if(r<rows-1) opts.push(empty+cols);
  if(c>0) opts.push(empty-1);
  if(c<cols-1) opts.push(empty+1);
  let t=opts[Math.floor(Math.random()*opts.length)];
  [tiles[t],tiles[empty]]=[tiles[empty],tiles[t]]; empty=t;
}

function isSolved(){ return tiles.every((v,i)=>v===i); }

function win(){
  overlay.style.display='flex';
  zoomImage.src=imgSrc;
  setTimeout(()=>{ zoomImage.style.transform='scale(1)'; zoomImage.style.opacity='1'; },50);
}

// Swipe support
let startX,startY;
puzzle.addEventListener("touchstart", e=>{ startX=e.touches[0].clientX; startY=e.touches[0].clientY; });
puzzle.addEventListener("touchend", e=>{
  let dx=e.changedTouches[0].clientX-startX;
  let dy=e.changedTouches[0].clientY-startY;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>20) tryMove('right'); else if(dx<-20) tryMove('left');
  } else {
    if(dy>20) tryMove('down'); else if(dy<-20) tryMove('up');
  }
});

function tryMove(dir){
  let r=Math.floor(empty/cols), c=empty%cols;
  if(dir==='up' && r<rows-1) move(empty+cols);
  if(dir==='down' && r>0) move(empty-cols);
  if(dir==='left' && c<cols-1) move(empty+1);
  if(dir==='right' && c>0) move(empty-1);
}
</script>

</body>
</html>
