<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Puzzle Game</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

h1 {
  font-size:22px;
  margin:10px;
}

#controls {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}

input, button {
  font-size:18px;
  padding:10px;
  width:90%;
  max-width:300px;
  border-radius:8px;
  border:none;
}

button {
  background:#38bdf8;
  color:black;
}

#puzzle {
  position:relative;
  margin:15px auto;
  touch-action:none;
  border-radius:12px;
  overflow:hidden;
  background:#020617;
}

.tile {
  position:absolute;
  border-radius:8px;
  transition: all 0.25s ease;
}

#overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#zoomImage {
  max-width:90vw;
  max-height:60vh;
  object-fit:contain;
  transform: scale(0.6);
  opacity:0;
  transition: all 0.6s ease;
}

</style>
</head>

<body>

<h1>🧩 Puzzle Game</h1>

<div id="controls">
<button onclick="setMode('story')">Story Mode</button>
<button onclick="setMode('quick')">Quick Play</button>

Size:
<input type="number" id="size" value="4" min="2" max="6">

<input type="file" id="imgUpload">

<button onclick="startGame()">Start</button>
</div>

<p>Moves: <span id="moves">0</span></p>

<div id="puzzle"></div>

<div id="overlay">
  <h2>✨ Completed ✨</h2>
  <img id="zoomImage">
  <br>
  <button onclick="nextLevel()">Next</button>
</div>

<script>
let size, tiles, empty, moves;
let imageSrc = '';
let mode = 'story';
let level = 0;

const storyImages = [
  "images/1.jpg",
  "images/2.jpg",
  "images/3.jpg"
];

const puzzle = document.getElementById('puzzle');

document.getElementById('imgUpload').onchange = e=>{
  imageSrc = URL.createObjectURL(e.target.files[0]);
};

function setMode(m){
  mode = m;
}

function startGame(){
  size = +document.getElementById('size').value;

  let tileSize = Math.min(window.innerWidth * 0.22, 100);
  puzzle.style.width = puzzle.style.height = (tileSize * size) + "px";

  if(mode==='story'){
    imageSrc = storyImages[level] || storyImages[0];
  }

  tiles = [...Array(size*size).keys()];
  empty = tiles.length-1;

  for(let i=0;i<150;i++) randomMove();

  moves=0;
  document.getElementById('moves').textContent=0;
  document.getElementById('overlay').style.display="none";
  document.getElementById('controls').style.display="flex";

  draw();
}

function draw(){
  puzzle.innerHTML='';
  let tileSize = puzzle.clientWidth / size;

  tiles.forEach((val,i)=>{
    if(val===size*size-1) return;

    let d=document.createElement('div');
    d.className='tile';

    let r=Math.floor(i/size), c=i%size;
    d.style.width=d.style.height=tileSize+"px";
    d.style.left=c*tileSize+"px";
    d.style.top=r*tileSize+"px";

    let ir=Math.floor(val/size), ic=val%size;

    d.style.backgroundImage=`url(${imageSrc})`;
    d.style.backgroundSize=`${size*100}%`;
    d.style.backgroundPosition=`${ic/(size-1)*100}% ${ir/(size-1)*100}%`;

    d.onclick=()=>move(i);

    puzzle.appendChild(d);
  });
}

function move(i){
  if(canMove(i)){
    [tiles[i],tiles[empty]]=[tiles[empty],tiles[i]];
    empty=i;
    moves++;
    document.getElementById('moves').textContent=moves;
    draw();

    if(isSolved()) win();
  }
}

function canMove(i){
  let r=Math.floor(i/size), c=i%size;
  let er=Math.floor(empty/size), ec=empty%size;
  return (r===er&&Math.abs(c-ec)===1)||(c===ec&&Math.abs(r-er)===1);
}

function randomMove(){
  let opts=[];
  let r=Math.floor(empty/size), c=empty%size;

  if(r>0) opts.push(empty-size);
  if(r<size-1) opts.push(empty+size);
  if(c>0) opts.push(empty-1);
  if(c<size-1) opts.push(empty+1);

  let t=opts[Math.floor(Math.random()*opts.length)];
  [tiles[t],tiles[empty]]=[tiles[empty],tiles[t]];
  empty=t;
}

function isSolved(){
  return tiles.every((v,i)=>v===i);
}

function win(){
  let overlay=document.getElementById('overlay');
  let img=document.getElementById('zoomImage');

  img.src=imageSrc;

  overlay.style.display="flex";
  document.getElementById('controls').style.display="none";

  setTimeout(()=>{
    img.style.transform="scale(1)";
    img.style.opacity="1";
  },50);
}

function nextLevel(){
  document.getElementById('zoomImage').style.transform="scale(0.6)";
  document.getElementById('zoomImage').style.opacity="0";

  level++;
  startGame();
}

// Swipe support
let startX, startY;

puzzle.addEventListener("touchstart", e=>{
  startX=e.touches[0].clientX;
  startY=e.touches[0].clientY;
});

puzzle.addEventListener("touchend", e=>{
  let dx=e.changedTouches[0].clientX-startX;
  let dy=e.changedTouches[0].clientY-startY;

  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>20) tryMove('right');
    else if(dx<-20) tryMove('left');
  } else {
    if(dy>20) tryMove('down');
    else if(dy<-20) tryMove('up');
  }
});

function tryMove(dir){
  let r=Math.floor(empty/size), c=empty%size;

  if(dir==='up' && r<size-1) move(empty+size);
  if(dir==='down' && r>0) move(empty-size);
  if(dir==='left' && c<size-1) move(empty+1);
  if(dir==='right' && c>0) move(empty-1);
}
</script>

</body>
</html>
