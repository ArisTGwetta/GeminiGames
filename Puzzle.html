<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sliding Puzzle V5</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

h1 { margin:10px; font-size:22px; }

#controls {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}

input, button {
  font-size:18px;
  padding:10px;
  width:90%;
  max-width:300px;
  border-radius:8px;
  border:none;
}

button { background:#38bdf8; color:black; }

#puzzle {
  display:grid;
  gap:4px;
  margin:15px auto;
  width:90vw;
  max-width:600px;
  aspect-ratio:1/1;
  background:#020617;
  border-radius:12px;
  overflow:hidden;
  touch-action:none;
}

.tile {
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  border-radius:8px;
  transition:all 0.2s ease;
  cursor:pointer;
}

#overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#zoomImage {
  max-width:90vw;
  max-height:60vh;
  object-fit:contain;
  transform:scale(0.6);
  opacity:0;
  transition:all 0.6s ease;
}
</style>
</head>

<body>

<h1>🧩 Sliding Puzzle</h1>

<div id="controls">
  <button onclick="startGame()">Start Game</button>

  Grid Size:
  <input type="number" id="size" value="4" min="2" max="8">

  Scramble:
  <input type="number" id="scramble" value="60" min="10" max="300">

  <input type="file" id="imgUpload">
</div>

<p>Moves: <span id="moves">0</span></p>

<div id="puzzle"></div>

<div id="overlay">
  <h2>✨ Completed! ✨</h2>
  <img id="zoomImage">
  <button onclick="startGame()">Play Again</button>
</div>

<script>
let size, tiles, empty, moves;
let imageSrc = '';
const puzzle = document.getElementById('puzzle');

document.getElementById('imgUpload').onchange = e=>{
  imageSrc = URL.createObjectURL(e.target.files[0]);
};

function startGame(){
  size = +document.getElementById('size').value;
  let scramble = +document.getElementById('scramble').value;

  puzzle.style.gridTemplateColumns = `repeat(${size},1fr)`;

  tiles = [...Array(size*size).keys()];
  empty = tiles.length - 1;

  for(let i=0;i<scramble;i++) randomMove();

  moves = 0;
  document.getElementById('moves').textContent = moves;

  document.getElementById('overlay').style.display = "none";

  draw();
}

function draw(){
  puzzle.innerHTML = '';

  tiles.forEach((val,i)=>{
    if(val === size*size-1) return;

    const tile = document.createElement('div');
    tile.className = 'tile';

    if(imageSrc){
      const r = Math.floor(val/size);
      const c = val % size;

      tile.style.backgroundImage = `url(${imageSrc})`;
      tile.style.backgroundSize = `${size*100}% ${size*100}%`;
      tile.style.backgroundPosition = `${c/(size-1)*100}% ${r/(size-1)*100}%`;
    } else {
      tile.style.backgroundColor = '#ddd';
    }

    tile.onclick = ()=>move(i);
    puzzle.appendChild(tile);
  });
}

function move(i){
  if(canMove(i)){
    [tiles[i],tiles[empty]] = [tiles[empty],tiles[i]];
    empty = i;

    moves++;
    document.getElementById('moves').textContent = moves;

    draw();

    if(isSolved()) win();
  }
}

function canMove(i){
  let r=Math.floor(i/size), c=i%size;
  let er=Math.floor(empty/size), ec=empty%size;

  return (r===er && Math.abs(c-ec)===1) ||
         (c===ec && Math.abs(r-er)===1);
}

function randomMove(){
  let opts=[];
  let r=Math.floor(empty/size), c=empty%size;

  if(r>0) opts.push(empty-size);
  if(r<size-1) opts.push(empty+size);
  if(c>0) opts.push(empty-1);
  if(c<size-1) opts.push(empty+1);

  let t = opts[Math.floor(Math.random()*opts.length)];
  [tiles[t],tiles[empty]] = [tiles[empty],tiles[t]];
  empty = t;
}

function isSolved(){
  return tiles.every((v,i)=>v===i);
}

function win(){
  const overlay = document.getElementById('overlay');
  const img = document.getElementById('zoomImage');

  img.src = imageSrc;

  overlay.style.display = "flex";

  setTimeout(()=>{
    img.style.transform = "scale(1)";
    img.style.opacity = "1";
  },50);
}

// Swipe
let startX,startY;

puzzle.addEventListener("touchstart", e=>{
  startX=e.touches[0].clientX;
  startY=e.touches[0].clientY;
});

puzzle.addEventListener("touchend", e=>{
  let dx=e.changedTouches[0].clientX-startX;
  let dy=e.changedTouches[0].clientY-startY;

  if(Math.abs(dx)>Math.abs(dy)){
    if(dx>20) tryMove('right');
    else if(dx<-20) tryMove('left');
  } else {
    if(dy>20) tryMove('down');
    else if(dy<-20) tryMove('up');
  }
});

function tryMove(dir){
  let r=Math.floor(empty/size), c=empty%size;

  if(dir==='up' && r<size-1) move(empty+size);
  if(dir==='down' && r>0) move(empty-size);
  if(dir==='left' && c<size-1) move(empty+1);
  if(dir==='right' && c>0) move(empty-1);
}
</script>

</body>
</html>
