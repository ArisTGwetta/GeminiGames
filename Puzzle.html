<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smooth Sliding Puzzle V2</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  text-align: center;
}

#controls {
  margin: 10px;
}

#puzzle {
  position: relative;
  margin: 20px auto;
  width: 320px;
  height: 320px;
  background: #020617;
  border-radius: 12px;
}

.tile {
  position: absolute;
  width: 80px;
  height: 80px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.tile:active {
  transform: scale(0.95);
}

#overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#overlay img {
  max-width:300px;
  border:4px solid white;
}

button {
  padding: 6px 10px;
  margin: 5px;
}
</style>

</head>
<body>

<h1>✨ Smooth Puzzle</h1>

<div id="controls">
Size: <input type="number" id="size" value="4" min="2" max="6">
Scramble: <input type="number" id="scramble" value="100">

<input type="file" id="imgUpload">
<input type="file" id="rewardUpload">

<br>
<button onclick="startGame()">Start</button>
</div>

<p>Moves: <span id="moves">0</span></p>

<div id="puzzle"></div>

<div id="overlay">
  <h1>🎉 Solved!</h1>
  <div id="reward"></div>
  <button onclick="startGame()">Restart</button>
</div>

<script>
let size, tiles, empty, moves;
let imageSrc = '', rewardSrc = '';
let animating = false;

const puzzle = document.getElementById('puzzle');

document.getElementById('imgUpload').onchange = e => {
  imageSrc = URL.createObjectURL(e.target.files[0]);
};

document.getElementById('rewardUpload').onchange = e => {
  rewardSrc = URL.createObjectURL(e.target.files[0]);
};

function startGame() {
  size = +document.getElementById('size').value;
  let scramble = +document.getElementById('scramble').value;

  puzzle.style.width = puzzle.style.height = (size * 80) + "px";

  tiles = [...Array(size*size).keys()];
  empty = tiles.length - 1;

  for(let i=0;i<scramble;i++) randomMove();

  moves = 0;
  document.getElementById('moves').textContent = 0;
  document.getElementById('overlay').style.display = "none";

  draw();
}

function draw() {
  puzzle.innerHTML = '';

  tiles.forEach((val, i) => {
    if(val === size*size-1) return;

    let tile = document.createElement('div');
    tile.className = 'tile';

    let row = Math.floor(i/size);
    let col = i % size;

    tile.style.left = col*80 + "px";
    tile.style.top = row*80 + "px";

    if(imageSrc){
      let r = Math.floor(val/size);
      let c = val % size;

      tile.style.backgroundImage = `url(${imageSrc})`;
      tile.style.backgroundSize = `${size*100}%`;
      tile.style.backgroundPosition = `${c/(size-1)*100}% ${r/(size-1)*100}%`;
    } else {
      tile.textContent = val+1;
      tile.style.background = "#334155";
      tile.style.display="flex";
      tile.style.alignItems="center";
      tile.style.justifyContent="center";
    }

    tile.onclick = () => move(i);
    puzzle.appendChild(tile);
  });
}

function move(i){
  if(animating) return;

  if(canMove(i)){
    animating = true;

    let target = empty;

    [tiles[i], tiles[empty]] = [tiles[empty], tiles[i]];
    empty = i;
    moves++;
    document.getElementById('moves').textContent = moves;

    draw();

    setTimeout(()=>{
      animating = false;
      if(isSolved()) win();
    }, 250);
  }
}

function canMove(i){
  let r=Math.floor(i/size), c=i%size;
  let er=Math.floor(empty/size), ec=empty%size;

  return (r===er && Math.abs(c-ec)===1)||(c===ec && Math.abs(r-er)===1);
}

function randomMove(){
  let options=[];
  let r=Math.floor(empty/size), c=empty%size;

  if(r>0) options.push(empty-size);
  if(r<size-1) options.push(empty+size);
  if(c>0) options.push(empty-1);
  if(c<size-1) options.push(empty+1);

  let t = options[Math.floor(Math.random()*options.length)];
  [tiles[t],tiles[empty]]=[tiles[empty],tiles[t]];
  empty=t;
}

function isSolved(){
  return tiles.every((v,i)=>v===i);
}

function win(){
  let overlay = document.getElementById('overlay');
  let reward = document.getElementById('reward');
  reward.innerHTML = '';

  let img = document.createElement('img');
  img.src = rewardSrc || imageSrc;
  reward.appendChild(img);

  overlay.style.display = "flex";
}

// Keyboard support
document.addEventListener("keydown", e => {
  let r=Math.floor(empty/size), c=empty%size;

  if(e.key==="ArrowUp" && r<size-1) move(empty+size);
  if(e.key==="ArrowDown" && r>0) move(empty-size);
  if(e.key==="ArrowLeft" && c<size-1) move(empty+1);
  if(e.key==="ArrowRight" && c>0) move(empty-1);
});
</script>

</body>
</html>
