<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>IK3 - MVP1</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }


        #main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        body {
            background: #0f172a;
            color: white;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            // justify-content: center;
            // align-items: center;
            user-select: none;
            touch-action: none;
            overscroll-behavior: none;
        }

        #app-container {
            width: 100%;
            max-width: 520px;
            padding: 12px;
        }

        #top-bar {
            width: 100%;
            max-width: 520px;
            margin: 16px auto 8px auto;
            text-align: center;
            font-size: 1rem;
            color: white;
        }

        #top-bar select {
            font-size: 1rem;
            padding: 4px 8px;
            border-radius: 6px;
            border: none;
            background: #1e293b;
            color: white;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.2);
        }

        #game-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: black;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.6);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: black;
        }

        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            z-index: 10;
            pointer-events: none;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <body>
        <div id="main-wrapper">
            <div id="top-bar">
                <label for="cameraModeSelect" style="display:none;">Camera Mode:</label>

                    <option value="FOLLOW">Scrolling (Follow)</option>
                </select>

                &nbsp;&nbsp;&nbsp;

                <label for="exitModeSelect" style="display:none;">Exit Location:</label>
                <select id="exitModeSelect" style="display:none;">
                    <option value="RANDOM">Random (Edge)</option>
                    <option value="FIXED">Fixed (1,1)</option>
                </select>
            </div>


            <div id="app-container">
                <div id="game-container">
                    <canvas id="gameCanvas"></canvas>

                    <!-- Overlays -->
                    <div id="message" class="overlay hidden"></div>
                    <div id="pause-message" class="overlay hidden"></div>
                </div>
            </div>
        </div>
    </body>

        function drawSkyIcon() {
            console.log("DRAWING SKY ICON:", skyIcon.sprite);

            if (!skyIcon.active) return;

            ctx.save();

            // Position above the temple frame
            const topOffset = TILE_SIZE * 0.4;
            ctx.translate(skyIcon.x, topOffset);

            const size = TILE_SIZE * 0.5;

            if (skyIcon.sprite === "sun") {
                // APOLLO — FIRE CHARIOT
                ctx.save();

                // Flame wheels
                ctx.fillStyle = "#FFB300";
                ctx.beginPath();
                ctx.arc(-size * 0.6, size * 0.3, size * 0.25, 0, Math.PI * 2);
                ctx.arc(size * 0.6, size * 0.3, size * 0.25, 0, Math.PI * 2);
                ctx.fill();

                // Chariot body
                ctx.fillStyle = "#FFD93D";
                ctx.beginPath();
                ctx.ellipse(0, size * 0.1, size * 0.9, size * 0.35, 0, 0, Math.PI * 2);
                ctx.fill();

                // Apollo (simple chibi silhouette)
                ctx.fillStyle = "#FFF7C0";
                ctx.beginPath();
                ctx.arc(0, -size * 0.2, size * 0.22, 0, Math.PI * 2); // head
                ctx.fill();

                ctx.fillRect(-size * 0.12, -size * 0.05, size * 0.24, size * 0.25); // torso

                // Reins
                ctx.strokeStyle = "#FFB300";
                ctx.lineWidth = size * 0.08;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(-size * 0.6, size * 0.3);
                ctx.moveTo(0, 0);
                ctx.lineTo(size * 0.6, size * 0.3);
                ctx.stroke();

                ctx.restore();
            }

            else if (skyIcon.sprite === "moon") {
                // ARTEMIS — GLOWING MOON ARCH
                ctx.save();

                // Crescent bow
                ctx.strokeStyle = "#A0B4FF";
                ctx.lineWidth = size * 0.18;
                ctx.beginPath();
                ctx.arc(0, 0, size * 0.7, -0.6, 0.6);
                ctx.stroke();

                // Glow
                ctx.shadowColor = "#A0B4FF";
                ctx.shadowBlur = size * 0.6;

                // Artemis silhouette
                ctx.fillStyle = "#E0E8FF";
                ctx.beginPath();
                ctx.arc(0, -size * 0.15, size * 0.22, 0, Math.PI * 2); // head

                ctx.lineWidth = size * 0.05;
                ctx.beginPath();
                ctx.moveTo(-size * 0.6, 0);
                ctx.lineTo(size * 0.6, 0);
                ctx.stroke();

                ctx.restore();
            }

        // ---------------------------------------------------------
        // Initialize Mini at a world position
        // ---------------------------------------------------------
        function initializeMini(startCol, startRow) {
            // If the requested tile is invalid, pick a safe one
            let r = startRow;
            let c = startCol;

            if (
                r < 0 || r >= WORLD.height ||
                c < 0 || c >= WORLD.width ||
                WORLD.map[r][c] !== 2
            ) {
                const safe = findRandomFloorTile();
                r = safe.r;
                c = safe.c;
            }

            MINI.worldCol = c;
            MINI.worldRow = r;
            MINI.nextCol = c;
            MINI.nextRow = r;

            const { x, y } = getCenterPixel(c, r);
            MINI.x = x;
            MINI.y = y;

            setNextTarget(MINI, MINI.direction);
        }


        // ---------------------------------------------------------
        // Mini uses RED ghost logic: target Pacman's current tile
        // ---------------------------------------------------------
        function getMiniDirection() {
            // Red ghost logic: chase Pacman's tile
            const target = {
                x: pacman.worldCol,
                y: pacman.worldRow
            };

            // Reuse your existing ghost direction logic
            return getGhostDirection({
                worldCol: MINI.worldCol,
                worldRow: MINI.worldRow,
                direction: MINI.direction,
                targetFn: () => target
            });
        }

        // ---------------------------------------------------------
        // Breadcrumb crushing (same as Minotaur)
        // ---------------------------------------------------------
        function miniCrushBreadcrumbs() {
            const centerX = MINI.worldCol * TILE_SIZE + TILE_SIZE / 2;
            const centerY = MINI.worldRow * TILE_SIZE + TILE_SIZE / 2;

            const aligned =
                Math.abs(MINI.x - centerX) < 0.5 &&
                Math.abs(MINI.y - centerY) < 0.5;

            if (aligned && WORLD.map[MINI.worldRow][MINI.worldCol] === 0) {
                WORLD.map[MINI.worldRow][MINI.worldCol] = 5; // crushed breadcrumb
            }
        }

        // ---------------------------------------------------------
        // Update Mini (ghost-style movement)
        // ---------------------------------------------------------
        function updateMini() {
            const speed = TILE_SIZE * MINI.speed * speedMultiplier;

            // Crush breadcrumbs when aligned
            miniCrushBreadcrumbs();

            // Move Mini
            const arrived = moveEntity(MINI, speed);

            if (arrived) {
                MINI.direction = getMiniDirection();
                setNextTarget(MINI, MINI.direction);
            }

            // Collision with Pacman/Ikarus
            const dx = MINI.x - pacman.x;
            const dy = MINI.y - pacman.y;
            const dist = Math.hypot(dx, dy);

            if (dist < TILE_SIZE * 0.5) {
                handlePacmanDeath();
            }
        }

                        [{ dc: 0, dr: 0 }, { dc: 1, dr: 0 }],
                        [{ dc: 0, dr: 0 }, { dc: 0, dr: 1 }],
                        [{ dc: 0, dr: 0 }, { dc: 1, dr: 1 }]
                    ];
                    const shape = shapes[randInt(0, shapes.length - 1)];
                    for (const s of shape) {
                        const cc = c0 + s.dc;
                        const rr = r0 + s.dr;
                        if (world[rr] && world[rr][cc] === 2 && canPlaceWall(cc, rr)) {
                            world[rr][cc] = 1;
                        }
                    }
                }

                for (let i = 0; i < steps; i++) {
                    const nc = bc + bdir.dc;
                    const nr = br + bdir.dr;

                    if (!inBounds(nc, nr)) {
                        bdir = dirs[randInt(0, 3)];
                        continue;
                    }

                    if (Math.random() < 0.25) {
                        dropBlock(nc, nr);
                    }

                    bc = nc;
                    br = nr;

                    if (Math.random() < 0.25) {
                        bdir = dirs[randInt(0, 3)];
                    }
                }
            }

            blockDropperSerpent(150);

            // ---------------------------------------------------------
            // ADD LOOPS
            // ---------------------------------------------------------

            for (let rr = 0; rr < worldH; rr++) {
                for (let cc = 0; cc < worldW; cc++) {
                    if (world[rr][cc] !== 2) continue;

                    for (const d of dirs) {
                        const nc = cc + d.dc;
                        const nr = rr + d.dr;
                        if (!inBounds(nc, nr)) continue;
                        if (world[nr][nc] === 1 && Math.random() < 0.10) {
                            world[nr][nc] = 2;
                            path.push({ c: nc, r: nr });
                        }
                    }
                }
            }


            // ---------------------------------------------------------
            // VALIDATOR PASS — SELF-HEALING LABYRINTH
            // Ensures every floor tile has 2–3 floor neighbors and 1–2 wall neighbors.
            // Fixes dead ends, peninsulas, micro-islands, and over-open voids.
            // ---------------------------------------------------------

            function validatorPass(world) {
                const H = world.length;
                const W = world[0].length;

                function inBounds(c, r) {
                    return c >= 0 && c < W && r >= 0 && r < H;
                }

                const dirs = [
                    { dc: 1, dr: 0 },
                    { dc: -1, dr: 0 },
                    { dc: 0, dr: 1 },
                    { dc: 0, dr: -1 }
                ];

                // One sweep that repairs tiles
                function sweep() {
                    let changed = false;

                    for (let r = 0; r < H; r++) {
                        for (let c = 0; c < W; c++) {

                            if (world[r][c] !== 2) continue; // only fix floor tiles

                            // Count neighbors
                            let floorN = 0;
                            let wallN = 0;

                            for (const d of dirs) {
                                const nc = c + d.dc;
                                const nr = r + d.dr;
                                if (!inBounds(nc, nr)) continue;
                                if (world[nr][nc] === 2) floorN++;
                                else wallN++;
                            }

                            // RULES:
                            // 1) If floor neighbors < 2 → carve a neighbor
                            if (floorN < 2) {
                                for (const d of dirs) {
                                    const nc = c + d.dc;
                                    const nr = r + d.dr;
                                    if (inBounds(nc, nr) && world[nr][nc] === 1) {
                                        world[nr][nc] = 2;
                                        changed = true;
                                        break;
                                    }
                                }
                            }

                            // 2) If floor neighbors > 3 → build a neighbor
                            else if (floorN > 3) {
                                for (const d of dirs) {
                                    const nc = c + d.dc;
                                    const nr = r + d.dr;
                                    if (inBounds(nc, nr) && world[nr][nc] === 2) {
                                        world[nr][nc] = 1;
                                        changed = true;
                                        break;
                                    }
                                }
                            }

                            // 3) If wall neighbors < 1 → build a wall
                            else if (wallN < 1) {
                                for (const d of dirs) {
                                    const nc = c + d.dc;
                                    const nr = r + d.dr;
                                    if (inBounds(nc, nr) && world[nr][nc] === 2) {
                                        world[nr][nc] = 1;
                                        changed = true;
                                        break;
                                    }
                                }
                            }

                            // 4) If wall neighbors > 2 → carve a wall
                            else if (wallN > 2) {
                                for (const d of dirs) {
                                    const nc = c + d.dc;
                                    const nr = r + d.dr;
                                    if (inBounds(nc, nr) && world[nr][nc] === 1) {
                                        world[nr][nc] = 2;
                                        changed = true;
                                        break;
                                    }
                                }
                            }
                        }
                    }

                    return changed;
                }

                // Run 2–4 sweeps until stable
                for (let i = 0; i < 4; i++) {
                    if (!sweep()) break;
                }
            }

            validatorPass(world);
            SERPENT_PATH = path;
            return world;
        }

        /* ---------------------------------------------------------
           IK2 — SAFE FLOOR TILE FINDER
        --------------------------------------------------------- */

        function floodFillReachable(startC, startR) {
            const reachable = new Set();
            const stack = [{ c: startC, r: startR }];

            while (stack.length > 0) {
                const { c, r } = stack.pop();
                const key = `${c},${r}`;

                if (reachable.has(key)) continue;
                if (WORLD.map[r][c] !== FLOOR) continue;

                reachable.add(key);

                // 4‑way neighbors
                if (r > 0) stack.push({ c, r: r - 1 });
                if (r < WORLD.height - 1) stack.push({ c, r: r + 1 });
                if (c > 0) stack.push({ c: c - 1, r });
                if (c < WORLD.width - 1) stack.push({ c: c + 1, r });
            }

            return reachable;
        }


        function findRandomFloorTile() {
            while (true) {
                const r = Math.floor(Math.random() * WORLD.height);
                const c = Math.floor(Math.random() * WORLD.width);

                // 2 = empty floor (your new default)
                if (WORLD.map[r][c] === 2) {
                    return { r, c };
                }
            }
        }

        /* ---------------------------------------------------------
           2.4.3 RANDOM KEY PLACEMENT (GLOBAL)
        --------------------------------------------------------- */

        let hasKey = false;
        let keyPos = null;
        let exitPos = null;

        function placeKey() {
            // Prefer placing the key on the early part of the serpent path
            if (SERPENT_PATH && SERPENT_PATH.length > 0) {
                const idx = Math.max(1, (SERPENT_PATH.length * 0.2) | 0);
                const cell = SERPENT_PATH[idx];
                WORLD.map[cell.r][cell.c] = 3; // key
                return { r: cell.r, c: cell.c };
            }

            // Fallback: old random logic
            let attempts = 0;

            while (attempts < 2000) {
                const r = Math.floor(Math.random() * WORLD.height);
                const c = Math.floor(Math.random() * WORLD.width);

                const tile = WORLD.map[r][c];

                if (tile === 0 || tile === 2) {
                    WORLD.map[r][c] = 3;   // key
                    return { r, c };
                }

                attempts++;
            }

            return null;
        }


        /* ---------------------------------------------------------
           2.4.4 EXIT PLACEMENT (FIXED + RANDOM + DISPATCHER)
        --------------------------------------------------------- */

        function placeExitFixed() {
            const r = 1;
            const c = 1;

            if (WORLD.map[r][c] === 1) {
                WORLD.map[r][c] = 0;
            }

            WORLD.map[r][c] = 4;
            return { r, c };
        }

        function placeExitRandom() {
            // Prefer placing the exit on the late part of the serpent path
            if (SERPENT_PATH && SERPENT_PATH.length > 0) {
                const idx = Math.max(
                    0,
                    Math.min(
                        SERPENT_PATH.length - 1,
                        (SERPENT_PATH.length * 0.8) | 0
                    )
                );
                const cell = SERPENT_PATH[idx];

                // Ensure it's floor
                if (WORLD.map[cell.r][cell.c] === 1) {
                    WORLD.map[cell.r][cell.c] = 2;
                }

                WORLD.map[cell.r][cell.c] = 4; // exit
                return { r: cell.r, c: cell.c };
            }

            // Fallback: old random logic
            let attempts = 0;

            while (attempts < 5000) {
                const r = Math.floor(Math.random() * WORLD.height);
                const c = Math.floor(Math.random() * WORLD.width);

                const tile = WORLD.map[r][c];

                if (tile === 2) {
                    WORLD.map[r][c] = 4;
                    return { r, c };
                }

                attempts++;
            }

            return null;
        }

        function placeExitBasedOnMode() {
            if (exitMode === "FIXED") {
                return placeExitFixed();
            } else {
                return placeExitRandom();
            }
        }

        function showExitDebugMessage() {
            const msg = document.getElementById("message");

        /* ---------------------------------------------------------
           2.4.5 SEAL OUTER BORDERS
        --------------------------------------------------------- */

        function sealWorldBorders() {
            for (let c = 0; c < WORLD.width; c++) {
                WORLD.map[0][c] = 1;
                WORLD.map[WORLD.height - 1][c] = 1;
            }
            for (let r = 0; r < WORLD.height; r++) {
                WORLD.map[r][0] = 1;
                WORLD.map[r][WORLD.width - 1] = 1;
            }
        }




        /* ---------------------------------------------------------
           2.4.6 REBUILD WORLD + RESTART GAME (for exitMode changes)
        --------------------------------------------------------- */

        function rebuildWorldAndRestart() {
            WORLD.map = buildMegaMap();
            sealWorldBorders();
            keyPos = placeKey();
            exitPos = placeExitBasedOnMode();
            regenerateTileVariants();   // ⭐ add this

            // Ensure key + exit are reachable from Pacman's start
            (function ensureReachability() {
                // 1. Flood-fill from Pacman's start
                const start = findRandomFloorTile();
                const reachableFromStart = floodFillReachable(start.c, start.r);

                function pickReachable(set) {
                    const arr = Array.from(set);
                    const [c, r] = arr[Math.floor(Math.random() * arr.length)].split(',').map(Number);
                    return { c, r };
                }

                // If wings unreachable from start → relocate wings
                if (!reachableFromStart.has(`${keyPos.c},${keyPos.r}`)) {
                    keyPos = pickReachable(reachableFromStart);
                }

                // 2. Flood-fill from wings (after relocation if needed)
                const reachableFromWings = floodFillReachable(keyPos.c, keyPos.r);

                // If exit unreachable from wings → relocate exit
                if (!reachableFromWings.has(`${exitPos.c},${exitPos.r}`)) {
                    exitPos = pickReachable(reachableFromWings);
                }
            })();



            resetGame();
        }

        // --- MOVEMENT CHECK (GLOBAL) ---
        function canMove(entity, direction) {
            const d = DIRS[direction];
            const col = entity.worldCol + d.x;
            const row = entity.worldRow + d.y;

            if (
                row < 0 || row >= WORLD.height ||
                col < 0 || col >= WORLD.width
            ) {
                return false;
            }

            const tile = WORLD.map[row][col];
            return isPassable(tile);
        }

        // --- TARGET TILE (GLOBAL) ---
        function setNextTarget(entity, direction) {
            const d = DIRS[direction];
            if (!d) {
                // Invalid direction — stay put
                const { x, y } = getCenterPixel(entity.worldCol, entity.worldRow);
                entity.targetX = x;
                entity.targetY = y;
                entity.nextCol = entity.worldCol;
                entity.nextRow = entity.worldRow;
                return;
            }

            const nextCol = entity.worldCol + d.x;
            const nextRow = entity.worldRow + d.y;

            // Out of bounds or blocked
            if (
                nextRow < 0 || nextRow >= WORLD.height ||
                nextCol < 0 || nextCol >= WORLD.width ||
                !isPassable(WORLD.map[nextRow][nextCol])
            ) {
                // Stay in place safely
                const { x, y } = getCenterPixel(entity.worldCol, entity.worldRow);
                entity.targetX = x;
                entity.targetY = y;
                entity.nextCol = entity.worldCol;
                entity.nextRow = entity.worldRow;
                return;
            }

            entity.nextCol = nextCol;
            entity.nextRow = nextRow;

            const { x, y } = getCenterPixel(nextCol, nextRow);
            entity.targetX = x;
            entity.targetY = y;
        }



        // --- MOVE TOWARD TARGET (GLOBAL GRID) ---
        function moveEntity(entity, speed, threshold = 0.01) {
            const dx = entity.targetX - entity.x;
            const dy = entity.targetY - entity.y;

            // Arrived at tile center
            if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) {
                entity.x = entity.targetX;
                entity.y = entity.targetY;

                // Snap to integer tile coordinates
                entity.worldCol = entity.nextCol;
                entity.worldRow = entity.nextRow;

                return true;
            }

            const dist = Math.hypot(dx, dy);
            const step = Math.min(speed, dist);

            entity.x += (dx / dist) * step;
            entity.y += (dy / dist) * step;

            // Do NOT update worldRow/worldCol until arrival
            return false;
        }

        // --- CANVAS & TILE SIZE (BASED ON VIEW WINDOW) ---
        function resizeCanvas() {
            const container = canvas.parentElement;

            const maxWidth = container.clientWidth || window.innerWidth;
            const maxHeight = container.clientHeight || window.innerHeight;

            TILE_SIZE = Math.max(
                8,
                Math.floor(
                    Math.min(
                        maxWidth / VIEW_WIDTH,
                        maxHeight / VIEW_HEIGHT
                    )
                )
            );

            TILE_SIZE = Math.floor(TILE_SIZE);  // force integer size

            canvas.width = TILE_SIZE * VIEW_WIDTH;
            canvas.height = TILE_SIZE * VIEW_HEIGHT;

            pacman.radius = TILE_SIZE * 0.42;
        }

        /* =========================================================

           ========================================================= */

        const DEBUG_SHOW_EXIT = true;   // turn off later

        function drawTile(tile, x, y, r, c) {
            ctx.save();

            // Night distance falloff
            let dist = 0;
            if (isNight) {
                const dx = (x + TILE_SIZE / 2) - pacman.x;
                const dy = (y + TILE_SIZE / 2) - pacman.y;
                dist = Math.sqrt(dx * dx + dy * dy) / TILE_SIZE;
            }

            // ============================
            // WALL — now uses cube images
            // ============================
            if (tile === 1) {
                const variant = tileVariant[r][c];
                const img = wallCubeTiles[variant];

                // Optional night brightness
                if (isNight) {
                    const brightness = Math.max(0.30, 1 - dist * 0.10);
                    ctx.globalAlpha = brightness;
                }

                ctx.drawImage(img, x, y, TILE_SIZE, TILE_SIZE);
                ctx.restore();
                return;
            }

            // ============================
            // FLOOR — uses floor textures
            // ============================
            if (tile === 2) {
                const variant = tileVariant[r][c];
                const img = floorTiles[variant];

                if (isNight) {
                    const brightness = Math.max(0.25, 1 - dist * 0.10);
                    ctx.globalAlpha = brightness;
                }

                ctx.drawImage(img, x, y, TILE_SIZE, TILE_SIZE);
                ctx.restore();
                return;
            }

            // KEY
            if (tile === 3) {
                ctx.drawImage(KEY_IMG, x, y, TILE_SIZE, TILE_SIZE);
            }

            // DOOR / PORTAL
            if (tile === 4 || tile === 6) {
                ctx.drawImage(DOOR_IMG, x, y, TILE_SIZE, TILE_SIZE);
            }

            // ============================
            // PELLET FLOOR (tile 0)
            // ============================
            if (tile === 0) {
                ctx.drawImage(FLOOR_PELLET_IMG, x, y, TILE_SIZE, TILE_SIZE);
                ctx.restore();
                return;
            }

            // ============================
            // CRUSHED FLOOR (tile 5)
            // ============================
            if (tile === 5) {
                ctx.drawImage(FLOOR_CRUSHED_IMG, x, y, TILE_SIZE, TILE_SIZE);
                ctx.restore();
                return;
            }

            // ============================
            // KEY (tile 3)
            // ============================
            if (tile === 3) {
                ctx.drawImage(KEY_IMG, x, y, TILE_SIZE, TILE_SIZE);
            }

            // ============================
            // DOOR / PORTAL (tile 4 or 6)
            // ============================
            if (tile === 4 || tile === 6) {
                ctx.drawImage(DOOR_IMG, x, y, TILE_SIZE, TILE_SIZE);
            }

            ctx.restore();

        }

        //-----------

        function drawSpriteAt(sprite, x, y) {
            ctx.save();
            ctx.translate(x, y);

            const scale = TILE_SIZE / sprite.width;
            ctx.scale(scale, scale);

        function drawWingPickupMoment() {

            drawPacmanAt(pacman.x, pacman.y - rise);

        function drawVisibleWorld() {

            ctx.save();

            ctx.beginPath();
            ctx.rect(0, 0, canvas.width, canvas.height);

            // --- FRACTIONAL CAMERA OFFSET ---
            const offsetX = CAMERA.col * TILE_SIZE;
            const offsetY = CAMERA.row * TILE_SIZE;

            // --- OVERSCAN: draw 1 tile beyond each edge ---
            const startRow = Math.floor(CAMERA.row) - 1;
            const endRow = Math.floor(CAMERA.row) + VIEW_HEIGHT + 1;

            const startCol = Math.floor(CAMERA.col) - 1;
            const endCol = Math.floor(CAMERA.col) + VIEW_WIDTH + 1;

            for (let r = startRow; r <= endRow; r++) {
                for (let c = startCol; c <= endCol; c++) {

                    // Prevent out-of-bounds access
                    if (r < 0 || r >= WORLD.height) continue;
                    if (c < 0 || c >= WORLD.width) continue;

                    const tile = WORLD.map[r][c];
                    const screenX = c * TILE_SIZE - CAMERA.col * TILE_SIZE;
                    const screenY = r * TILE_SIZE - CAMERA.row * TILE_SIZE;

                    drawTile(tile, screenX, screenY, r, c);
                }
            }

            ctx.restore();
        }   // closes drawVisibleWorld()

        function isNearTileCenter(entity) {

        /* =========================================================

        function updatePacman() {

            // --- WING MOMENT FREEZE ---
            if (performance.now() < window.wingMomentUntil) {
                // Pacman is frozen during the wing pickup moment
                return;
            }

            // --- VICTORY FLOAT MODE ---
            if (window.victoryMode) {
                // Pacman no longer moves normally
                return;
            }

            // --- DEATH PHASE FREEZE ---
            if (
                deathPhase === 'DYING' ||
                deathPhase === 'RETURNING' ||
                deathPhase === 'RESPAWNING'
            ) {
                return;
            }

            const speed = TILE_SIZE * PACMAN_SPEED * speedMultiplier;
            window.globalSlowFactor = 1;


            // --- TURNING (Buffered IK2 Logic) ---
            if (pacman.requestedDirection !== pacman.direction) {

                // If we are near the center AND the requested direction is valid,
                // turn immediately.
                // --- TURNING (Buffered IK2 Logic) ---
                if (pacman.requestedDirection !== pacman.direction) {

                    // If we are near the center AND the requested direction is valid,
                    // turn immediately.
                    if (isNearTileCenter(pacman) && canMove(pacman, pacman.requestedDirection)) {
                        pacman.direction = pacman.requestedDirection;
                        setNextTarget(pacman, pacman.direction);

                        // Ensure movement continues through the turn
                        pacman.mustFinishTile = true;
                    }

                    // Otherwise: keep requestedDirection active
                }

                // Otherwise:
                // DO NOT clear requestedDirection.
                // Keep it active so the turn will happen automatically
                // as soon as Ikarus reaches a valid intersection.
            }


            // --- MOVE ---
            // const arrived = moveEntity(pacman, speed);
            // --- MOVE (IK2 Smooth Movement Logic) ---
            let arrived = false;

            // Continue moving if:
            // 1. The player is holding a movement key, OR
            // 2. A buffered turn is in progress (mustFinishTile), OR
            // 3. We are between tile centers (never stop mid‑tile)
            if (pacman.isMoving || pacman.mustFinishTile || !isNearTileCenter(pacman)) {
                arrived = moveEntity(pacman, speed);
            }

            // When we reach the tile center, clear the turn‑continuation flag
            if (arrived) {
                pacman.mustFinishTile = false;
            }


            const r = pacman.worldRow;
            const c = pacman.worldCol;

            // --- PELLET / CRUSHED BREADCRUMB PICKUP ---
            if (WORLD.map[r][c] === 2) {
                WORLD.map[r][c] = 0;
                score += 10;
            }
            if (WORLD.map[r][c] === 5) {
                WORLD.map[r][c] = 0;
                score += 10;
            }

            // --- KEY PICKUP ---
            if (WORLD.map[r][c] === 3) {
                hasKey = true;
                WORLD.map[r][c] = 2;

                window.wingMomentUntil = performance.now() + 1200;
                window.showWingMessage = true;
                window.globalSlowFactor = 0.1;

                if (performance.now() < window.wingMomentUntil) {
                    return;
                } else {
                    window.globalSlowFactor = 1;
                }
            }

            // --- EXIT COLLISION ---
            if (WORLD.map[r][c] === 4 && hasKey) {
                window.victoryMode = true;
                trioStartTime = null;
                window.victoryStart = performance.now();
            }

            // --- CONTINUE MOVING ---
            if (pacman.isMoving && arrived && canMove(pacman, pacman.direction)) {
                setNextTarget(pacman, pacman.direction);
            }



            // --- MOUTH ANIMATION ---
            if (pacman.isMoving) {
                pacman.mouthAngle += pacman.mouthClosing ? -0.04 : 0.04;
                if (pacman.mouthAngle <= 0 || pacman.mouthAngle >= Math.PI / 4) {
                    pacman.mouthClosing = !pacman.mouthClosing;
                }
            }
        }

        function drawPacman() {
            const img = getIkarusImage();

            // Convert world → screen
            const screenX = pacman.x - CAMERA.col * TILE_SIZE;
            const screenY = pacman.y - CAMERA.row * TILE_SIZE;

            // Apply scale
            const size = TILE_SIZE * SCALE_IKARUS;

            // Center the sprite on the tile
            const drawX = screenX - size / 2;
            const drawY = screenY - size / 2;

            ctx.drawImage(img, drawX, drawY, size, size);
        }

        function drawMessage(text) {
            ctx.save();

            // Soft golden glow (IK2 style)
            ctx.fillStyle = '#facc15';
            ctx.shadowColor = '#facc15';
            ctx.shadowBlur = 12;

            ctx.font = `${TILE_SIZE * 0.8}px sans-serif`;
            ctx.textAlign = 'center';

            ctx.fillText(
                text,
                canvas.width / 2,
                canvas.height * 0.75
            );

            ctx.restore();
        }

           ========================================================= */


        /* =========================================================
           BLOCK 5.5 — IKARUS PIXEL SPRITE DRAWING HELPERS
           ========================================================= */

        function drawPixelSprite(ctx, sprite, scale) {
            const { pixels, palette, width, height } = sprite;

            ctx.save();
            ctx.scale(scale, scale);

            for (let y = 0; y < height; y++) {
                const row = pixels[y];
                for (let x = 0; x < width; x++) {
                    const colorIndex = row[x];
                    if (colorIndex === 0) continue; // transparent

                    ctx.fillStyle = palette[colorIndex];
                    ctx.fillRect(x, y, 1, 1);
                }
            }

            ctx.restore();
        }

        function getPacGhostObject() {
            return {
                x: pacman.x,
                y: pacman.y,
                color: "#facc15",   // Pac-Man yellow
                name: "PacGhost",
                danceOffset: 0,
                shimmerTimer: 0,
                shimmerSpeed: 0,
                isPacGhost: true,
                alpha: 1.0            // FULL OPACITY
            };
        }
